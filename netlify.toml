# Netlify configuration — static site, no build step needed.
[build]
  publish = "."

# Long-cache the figures (they never change once published)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
